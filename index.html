<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Brick Breaker</title>
    <link rel="stylesheet" href="./main.css">
    <script src="./global.js"></script>
    <script src="./transform.js"></script>
    <script src="./ui.js"></script>
    <script src="./effect.js"></script>
    <script src="./game.js"></script>
    <script src="./sample_scene.js"></script>
    <script src="./map-editor.js"></script>
    <script src="./sound.js"></script>
    <script src="./score.js"></script>
    <script src="./play_scene.js"></script>
    <script src="./boss.js"></script>
    <script src="./main.js"></script>
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <div id="topnav">
        <div class="nav-logo"><span class="pick">⛏</span> Brick Breaker</div>
        <nav class="nav-menu">
        </nav>
    </div>

    <!-- 본문 가운데 컬럼 -->
    <div id="page">
        <div class="breadcrumb">Web Programming</div>
        <h1 class="page-title">Brick Breaker : Minecraft</h1>
        <hr class="divider">

        <!-- 맵 에디터 패널 (기존 유지) -->
        <div id="map-editor">
            <h2>Map Editor</h2>
            <div>
                <span>Map: </span>
                <select id="map-select"></select>
                <input type="text" id="map-name">
                <img src="assets/etc/plus-icon.png" id="add-btn">
                <img src="assets/etc/save-icon.png" id="save-btn">
            </div>
        </div>

        <!-- 게임 화면 -->
        <div id="canvas-wrapper">
            <canvas id="game" width="1024" height="768"></canvas>
            <canvas id="ui" width="1024" height="768"></canvas>
        </div>

        <!-- 저작권 / 출처 표시 -->
        <div class="credits">
            <h2>이미지 출처</h2><br>
            <p class="credits-sub">
                본 게임에 사용된 블록·아이템 등의 이미지는
                <a href="https://minecraft.wiki/" target="_blank" rel="noopener" style="color:#5fd1ff;">Minecraft Wiki (minecraft.wiki)</a>
                에서 가져왔습니다.
            </p>
            <p class="credits-sub" style="margin-bottom:0;">
                Minecraft 및 관련 이미지의 모든 권리는 Mojang Studios에 있으며, 본 프로젝트는 비상업적 학습 목적으로 제작되었습니다.
            </p>
        </div>

        <!-- 로그 (기존 유지) -->
        <div id="log"></div>
    </div>
</body>

</html>
