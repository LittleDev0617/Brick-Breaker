<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="./main.css">
    <script src="./global.js"></script>
    <script src="./transform.js"></script>
    <script src="./ui.js"></script>
    <script src="./game.js"></script>
    <script src="./sample_scene.js"></script>
    <script src="./map-editor.js"></script>
    <script src="./sound.js"></script>
    <script src="./play_scene.js"></script>
    <script src="./main.js"></script>
</head>

<body>
    <div id="main">
        <div id="top">
            <div id="title">
                <h1>Brick - Breaker</h1>
            </div>
            <div id="map-editor">
                <h2>Map Editor</h2>
                <div>
                    <span>Map: </span>
                    <select id="map-select"></select>
                    <input type="text" id="map-name">
                    <img src="assets/etc/plus-icon.png" id="add-btn">
                    <img src="assets/etc/save-icon.png" id="save-btn">
                </div>
            </div>
        </div>

        <div id="center">
            <div class="sidebar">
            </div>
            <div id="canvas-wrapper">
                <canvas id="game" width="1024" height="768"></canvas>
                <canvas id="ui" width="1024" height="768"></canvas>
            </div>
            <div class="sidebar">
            </div>
        </div>

        <div id="bottom">
            <div id="log">

            </div>
        </div>
    </div>
</body>

</html>
