<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Brick Breaker</title>
    <link rel="stylesheet" href="./main.css">
    <script src="./global.js"></script>
    <script src="./transform.js"></script>
    <script src="./ui.js"></script>
    <script src="./effect.js"></script>
    <script src="./game.js"></script>
    <script src="./sample_scene.js"></script>
    <script src="./map-editor.js"></script>
    <script src="./sound.js"></script>
    <script src="./score.js"></script>
    <script src="./play_scene.js"></script>
    <script src="./boss.js"></script>
    <script src="./main.js"></script>
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <div id="topnav">
        <div class="nav-logo"><span class="pick">⛏</span> Brick Breaker</div>
        <nav class="nav-menu">
        </nav>
    </div>

    <!-- 본문 가운데 컬럼 -->
    <div id="page">
        <div class="breadcrumb">Web Programming</div>
        <h1 class="page-title">Brick Breaker : Minecraft</h1>
        <hr class="divider">

        <!-- 맵 에디터 패널 (기존 유지) -->
        <div id="map-editor">
            <h2>Map Editor</h2>
            <div>
                <span>Map: </span>
                <select id="map-select"></select>
                <input type="text" id="map-name">
                <img src="assets/etc/plus-icon.png" id="add-btn">
                <img src="assets/etc/save-icon.png" id="save-btn">
            </div>
        </div>

        <!-- 게임 화면 -->
        <div id="canvas-wrapper">
            <canvas id="game" width="1024" height="768"></canvas>
            <canvas id="ui" width="1024" height="768"></canvas>
        </div>

        <!-- 팀 소개란 -->
        <div class="team-intro">
            <h2>팀 소개</h2>
            <p class="team-sub">웹프로그래밍 팀 프로젝트 1조</p>
            <ul class="team-list">
                <li>유규민 <span>202311323</span></li>
                <li>궁영우 <span>202510935</span></li>
                <li>배유비 <span>202311300</span></li>
                <li>임희수 <span>202315317</span></li>
            </ul>
        </div>

        <!-- 로그 (기존 유지) -->
        <div id="log"></div>
    </div>
</body>

</html>
