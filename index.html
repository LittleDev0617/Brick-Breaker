<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Brick Breaker</title>
    <link rel="stylesheet" href="./main.css">
    <script src="./global.js"></script>
    <script src="./transform.js"></script>
    <script src="./ui.js"></script>
    <script src="./game.js"></script>
    <script src="./sample_scene.js"></script>
    <script src="./map-editor.js"></script>
    <script src="./sound.js"></script>
    <script src="./score.js"></script>
    <script src="./play_scene.js"></script>
    <script src="./main.js"></script>
</head>

<body>
    <!-- 상단 네비게이션 바 -->
    <div id="topnav">
        <div class="nav-logo"><span class="pick">⛏</span> Brick Breaker</div>
        <nav class="nav-menu">
            <span>게임</span>
            <span>맵 에디터</span>
            <span>환경설정</span>
            <span>게임방법</span>
            <span>팀</span>
        </nav>
    </div>

    <!-- 본문 가운데 컬럼 -->
    <div id="page">
        <div class="breadcrumb">자작 게임</div>
        <h1 class="page-title">Brick Breaker : Minecraft</h1>
        <hr class="divider">

        <!-- 게임 아이콘 바 -->
        <div class="icon-bar">
            <div class="game-icon"><img src="assets/blocks/over/grass.png"><span>오버월드</span></div>
            <div class="game-icon"><img src="assets/blocks/nether/netherrack.png"><span>네더</span></div>
            <div class="game-icon"><img src="assets/blocks/ender/end_crystal.png"><span>엔더</span></div>
            <div class="game-icon"><img src="assets/blocks/over/diamond_ore.png"><span>다이아</span></div>
            <div class="game-icon"><img src="assets/blocks/nether/blaze.png"><span>블레이즈</span></div>
            <div class="game-icon"><img src="assets/tools/diamond_pickaxe.png"><span>곡괭이</span></div>
            <div class="icon-arrow">→</div>
        </div>

        <!-- 맵 에디터 패널 (기존 유지) -->
        <div id="map-editor">
            <h2>Map Editor</h2>
            <div>
                <span>Map: </span>
                <select id="map-select"></select>
                <input type="text" id="map-name">
                <img src="assets/etc/plus-icon.png" id="add-btn">
                <img src="assets/etc/save-icon.png" id="save-btn">
            </div>
        </div>

        <!-- 게임 화면 -->
        <div id="canvas-wrapper">
            <canvas id="game" width="1024" height="768"></canvas>
            <canvas id="ui" width="1024" height="768"></canvas>
        </div>

        <!-- 로그 (기존 유지) -->
        <div id="log"></div>
    </div>
</body>

</html>
